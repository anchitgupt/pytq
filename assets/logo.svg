<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Background pill -->
  <rect x="0" y="0" width="400" height="120" rx="12" fill="#07090d"/>

  <!-- Quantization step visualization - 4 bars showing compression -->
  <g transform="translate(20, 20)">
    <!-- Full precision bar -->
    <rect x="0" y="0" width="8" height="80" rx="2" fill="#1c2433"/>
    <rect x="0" y="8" width="8" height="72" rx="2" fill="#6b7b8d" opacity="0.3"/>

    <!-- 4-bit bar -->
    <rect x="14" y="0" width="8" height="80" rx="2" fill="#1c2433"/>
    <rect x="14" y="16" width="8" height="64" rx="2" fill="#fbbf24" opacity="0.6"/>

    <!-- 3-bit bar -->
    <rect x="28" y="0" width="8" height="80" rx="2" fill="#1c2433"/>
    <rect x="28" y="24" width="8" height="56" rx="2" fill="#00e5c7" opacity="0.7"/>

    <!-- 2-bit bar -->
    <rect x="42" y="0" width="8" height="80" rx="2" fill="#1c2433"/>
    <rect x="42" y="40" width="8" height="40" rx="2" fill="#a78bfa" opacity="0.8"/>

    <!-- 1-bit bar -->
    <rect x="56" y="0" width="8" height="80" rx="2" fill="#1c2433"/>
    <rect x="56" y="56" width="8" height="24" rx="2" fill="#f87171" opacity="0.9"/>
  </g>

  <!-- pytq text -->
  <text x="105" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="600" fill="#f0f6fc" letter-spacing="-2">
    pytq
  </text>

  <!-- Subtitle -->
  <text x="108" y="95" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6b7b8d" letter-spacing="3">
    TURBOQUANT FOR PYTORCH
  </text>
</svg>
